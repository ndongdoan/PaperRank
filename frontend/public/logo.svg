<svg viewBox="100 70 310 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 1. Mặc định cho Light Mode */
    .edge { stroke: #94A3B8; opacity: 0.6; stroke-width: 4; stroke-linecap: round; }
    .node { fill: #2563EB; }
    .pivot { fill: #F97316; }

    /* 2. Tự động kích hoạt khi trình duyệt/hệ thống dùng Dark Mode */
    @media (prefers-color-scheme: dark) {
      .edge { stroke: #CBD5E1; opacity: 0.8; } /* Chuyển line thành màu xám sáng */
      .node { fill: #60A5FA; } /* Đẩy màu xanh lên tông sáng hơn (Blue-400) */
      .pivot { fill: #FB923C; } /* Cho màu cam rực hơn một chút xíu */
    }
  </style>

  <g class="edge">
    <line x1="256" y1="256" x2="380" y2="180" />
    <line x1="256" y1="256" x2="350" y2="360" />
    <line x1="256" y1="256" x2="200" y2="390" />
    <line x1="256" y1="256" x2="130" y2="280" />
    <line x1="256" y1="256" x2="160" y2="140" />
    <line x1="256" y1="256" x2="290" y2="100" />
  </g>

  <circle cx="380" cy="180" r="22" class="node" />
  <circle cx="350" cy="360" r="26" class="node" />
  <circle cx="200" cy="390" r="20" class="node" />
  <circle cx="130" cy="280" r="24" class="node" />
  <circle cx="160" cy="140" r="22" class="node" />
  <circle cx="290" cy="100" r="18" class="node" />

  <circle cx="256" cy="256" r="45" class="pivot" />
</svg>